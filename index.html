        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2333;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-orange: #d29922;
            --accent-purple: #bc8cff;
            --accent-red: #f85149;
            --whatsapp: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 40px 20px 30px;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        header h1 span { color: var(--accent-blue); }

        header p {
            color: var(--text-secondary);
            font-size: 1.05rem;
        }

        /* Badges */
        .badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge--blue { background: #1f3a5f; color: var(--accent-blue); }
        .badge--green { background: #1a3a2a; color: var(--accent-green); }
        .badge--orange { background: #3a2a1a; color: var(--accent-orange); }
        .badge--purple { background: #2a1a3a; color: var(--accent-purple); }

        /* Controls */
        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            padding: 20px 0;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 40px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus { border-color: var(--accent-blue); }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
        }

        .filter-select {
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
            min-width: 180px;
        }

        .filter-select:focus { border-color: var(--accent-blue); }

        .sort-btn {
            padding: 10px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .sort-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .sort-btn.active { border-color: var(--accent-blue); color: var(--accent-blue); background: #1f3a5f; }

        /* Stats */
        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding-bottom: 16px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .stats span { display: flex; align-items: center; gap: 4px; }

        /* Job Cards */
        .jobs-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 40px;
        }

        .job-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            transition: border-color 0.2s, transform 0.15s;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: start;
        }

        .job-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-1px);
        }

        .job-info { min-width: 0; }

        .job-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .job-title a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        .job-title a:hover { text-decoration: underline; }

        .job-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .job-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .job-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
            background: #1f3a5f;
            color: var(--accent-blue);
        }

        .tag--remote { background: #1a3a2a; color: var(--accent-green); }
        .tag--hybrid { background: #3a2a1a; color: var(--accent-orange); }
        .tag--onsite { background: #2a1a3a; color: var(--accent-purple); }

        .job-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-end;
        }

        .btn-apply {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            background: var(--accent-blue);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .btn-apply:hover { opacity: 0.85; }

        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--whatsapp);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .btn-whatsapp:hover { opacity: 0.85; }

        .btn-whatsapp svg {
            width: 16px;
            height: 16px;
            fill: #fff;
        }

        /* Country flag pills */
        .country-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            background: var(--bg-secondary);
            border-radius: 6px;
            font-size: 0.82rem;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state h3 { font-size: 1.3rem; margin-bottom: 8px; color: var(--text-primary); }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px 20px;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        footer a { color: var(--accent-blue); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        /* Responsive */
        @media (max-width: 640px) {
            header h1 { font-size: 1.4rem; }

            .job-card {
                grid-template-columns: 1fr;
            }

            .job-actions {
                flex-direction: row;
                align-items: center;
            }

            .controls { flex-direction: column; }
            .search-box { min-width: 100%; }
            .filter-select { width: 100%; }
        }
    </style>
</head>

    function getModalityTag(mod) {
        const map = {
            'Remoto': 'tag--remote',
            'Presencial': 'tag--onsite',
            'Híbrido': 'tag--hybrid'
        };
        return map[mod] || '';
    }

    function daysAgo(dateStr) {
        const diff = Math.floor((new Date() - new Date(dateStr)) / 86400000);
        if (diff === 0) return 'Hoy';
        if (diff === 1) return 'Ayer';
        return `Hace ${diff} días`;
    }

    function buildWhatsAppUrl(job) {
        const text = `💼 *Empleo en Ciberseguridad*\n\n` +
            `📌 *${job.title}*\n` +
            `🏢 ${job.company}\n` +
            `📍 ${job.flag} ${job.city}, ${job.country}\n` +
            `💰 ${job.salary || 'No especificado'}\n` +
            `📋 ${job.requirements.join(', ')}\n` +
            `🔗 ${job.url}\n\n` +
            `Visto en CyberSec Jobs LATAM`;
        return `https://wa.me/?text=${encodeURIComponent(text)}`;
    }

    function renderJobs(jobs) {
        const grid = document.getElementById('jobsGrid');

        if (jobs.length === 0) {
            grid.innerHTML = `

            return;

        grid.innerHTML = jobs.map(job => `

                        <span class="country-pill">${job.flag} ${job.city}, ${job.country}</span>

                        ${job.salary ? `<span>💰 ${job.salary}</span>` : ''}
                    </div>
                    <div class="job-tags">

    function updateBadges(jobs) {
        const countries = new Set(jobs.map(j => j.country));
        const remote = jobs.filter(j => j.modality === 'Remoto').length;
        const recent = jobs.filter(j => {
            const diff = (new Date() - new Date(j.date)) / 86400000;
            return diff <= 7;
        }).length;

        document.getElementById('badge-total').textContent = `📋 ${JOBS_DATA.length} empleos`;
        document.getElementById('badge-countries').textContent = `🌎 ${new Set(JOBS_DATA.map(j => j.country)).size} países`;
        document.getElementById('badge-remote').textContent = `🏠 ${JOBS_DATA.filter(j => j.modality === 'Remoto').length} remotos`;
        document.getElementById('badge-recent').textContent = `🕐 ${JOBS_DATA.filter(j => (new Date() - new Date(j.date)) / 86400000 <= 7).length} recientes`;

        document.getElementById('statsBar').innerHTML =
            `<span>Mostrando <strong>${jobs.length}</strong> de ${JOBS_DATA.length} empleos</span>` +
            (jobs.length < JOBS_DATA.length ? `<span>Filtros activos</span>` : '');
    }

    // ============================================================
    // FILTERS & SORT
    // ============================================================
    function applyFilters() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const country = document.getElementById('countryFilter').value;
        const modality = document.getElementById('modalityFilter').value;

        filteredJobs = JOBS_DATA.filter(job => {
            const matchSearch = !search ||
                job.title.toLowerCase().includes(search) ||
                job.company.toLowerCase().includes(search) ||
                job.country.toLowerCase().includes(search) ||
                job.city.toLowerCase().includes(search) ||
                job.requirements.some(r => r.toLowerCase().includes(search));

            const matchCountry = !country || job.country === country;
            const matchModality = !modality || job.modality === modality;

            return matchSearch && matchCountry && matchModality;
        });

        applySort();
        renderJobs(filteredJobs);
        updateBadges(filteredJobs);
    }

    function applySort() {
        filteredJobs.sort((a, b) => {
            let cmp;
            if (currentSort.field === 'date') {
                cmp = new Date(a.date) - new Date(b.date);
            } else {
                cmp = a.country.localeCompare(b.country);
            }
            return currentSort.asc ? cmp : -cmp;
        });
    }

    function toggleSort(field) {
        if (currentSort.field === field) {
            currentSort.asc = !currentSort.asc;
        } else {
            currentSort.field = field;
            currentSort.asc = true;
        }

        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(field === 'date' ? 'sortDateBtn' : 'sortCountryBtn').classList.add('active');

        applyFilters();
    }

    // ============================================================
    // INIT
    // ============================================================
    function init() {
        // Populate country filter
        const countries = [...new Set(JOBS_DATA.map(j => j.country))].sort();
        const countrySelect = document.getElementById('countryFilter');
        const flags = {};
        JOBS_DATA.forEach(j => flags[j.country] = j.flag);
        countries.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c;
            opt.textContent = `${flags[c]} ${c}`;
            countrySelect.appendChild(opt);
        });

        // Events
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('countryFilter').addEventListener('change', applyFilters);
        document.getElementById('modalityFilter').addEventListener('change', applyFilters);
        document.getElementById('sortDateBtn').addEventListener('click', () => toggleSort('date'));
        document.getElementById('sortCountryBtn').addEventListener('click', () => toggleSort('country'));

        // Initial render
        applyFilters();
    }

    document.addEventListener('DOMContentLoaded', init);
    </script>
